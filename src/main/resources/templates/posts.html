<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시판</title>
</head>
<body>
<h1>게시판</h1>

<h2>글쓰기</h2>
<input type="text" id="titleInput" placeholder="제목"><br>
<textarea id="contentInput" placeholder="내용"></textarea><br>
<button id="submitBtn">등록</button>

<h2>글 목록</h2>
<div id="postList"></div>

<script>
    function loadPosts() {
        fetch('/api/posts')
            .then(res => res.json())
            .then(posts => {
                const list = document.getElementById('postList');
                list.innerHTML = '';
                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.textContent = `[${post.id}] ${post.title}`;
                    list.appendChild(div);
                });
            });
    }

    function createPost() {
        const title = document.getElementById('titleInput').value;
        const content = document.getElementById('contentInput').value;

        fetch('/api/posts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, content: content, authorId: 1 })
        })
            .then(res => res.json())
            .then(() => {
                document.getElementById('titleInput').value = '';
                document.getElementById('contentInput').value = '';
                loadPosts();
            });
    }

    document.getElementById('submitBtn').addEventListener('click', createPost);
    loadPosts();
</script>
</body>
</html>
